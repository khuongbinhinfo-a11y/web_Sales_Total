<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f6ff"/>
      <stop offset="50%" stop-color="#faf9f7"/>
      <stop offset="100%" stop-color="#fef5ef"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a594f9" stop-opacity=".15"/>
      <stop offset="100%" stop-color="#7c6dd8" stop-opacity=".08"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fab1a0" stop-opacity=".12"/>
      <stop offset="100%" stop-color="#e8845a" stop-opacity=".06"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#55efc4" stop-opacity=".1"/>
      <stop offset="100%" stop-color="#00b894" stop-opacity=".05"/>
    </linearGradient>
    <radialGradient id="glowPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c6dd8" stop-opacity=".12"/>
      <stop offset="100%" stop-color="#7c6dd8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowOrange" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8845a" stop-opacity=".09"/>
      <stop offset="100%" stop-color="#e8845a" stop-opacity="0"/>
    </radialGradient>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- base -->
  <rect width="1200" height="800" fill="url(#bgGrad)"/>

  <!-- large soft glows -->
  <ellipse cx="900" cy="300" rx="400" ry="350" fill="url(#glowPurple)"/>
  <ellipse cx="200" cy="600" rx="350" ry="300" fill="url(#glowOrange)"/>

  <!-- floating circles -->
  <circle cx="980" cy="180" r="120" fill="url(#purpleGrad)" filter="url(#softBlur)"/>
  <circle cx="850" cy="500" r="80" fill="url(#orangeGrad)" filter="url(#softBlur)"/>
  <circle cx="1050" cy="620" r="60" fill="url(#greenGrad)" filter="url(#softBlur)"/>
  <circle cx="150" cy="200" r="90" fill="url(#purpleGrad)" filter="url(#softBlur)" opacity=".5"/>
  <circle cx="400" cy="700" r="70" fill="url(#orangeGrad)" filter="url(#softBlur)" opacity=".4"/>

  <!-- decorative rings -->
  <circle cx="1000" cy="350" r="200" fill="none" stroke="#a594f9" stroke-width="1" stroke-opacity=".08"/>
  <circle cx="1000" cy="350" r="280" fill="none" stroke="#a594f9" stroke-width=".6" stroke-opacity=".05"/>
  <circle cx="300" cy="650" r="160" fill="none" stroke="#e8845a" stroke-width="1" stroke-opacity=".07"/>
  <circle cx="300" cy="650" r="230" fill="none" stroke="#e8845a" stroke-width=".5" stroke-opacity=".04"/>

  <!-- subtle grid dots -->
  <g fill="#7c6dd8" fill-opacity=".04">
    <circle cx="100" cy="100" r="2"/><circle cx="200" cy="100" r="2"/><circle cx="300" cy="100" r="2"/><circle cx="400" cy="100" r="2"/><circle cx="500" cy="100" r="2"/><circle cx="600" cy="100" r="2"/><circle cx="700" cy="100" r="2"/><circle cx="800" cy="100" r="2"/><circle cx="900" cy="100" r="2"/><circle cx="1000" cy="100" r="2"/><circle cx="1100" cy="100" r="2"/>
    <circle cx="100" cy="200" r="2"/><circle cx="200" cy="200" r="2"/><circle cx="300" cy="200" r="2"/><circle cx="400" cy="200" r="2"/><circle cx="500" cy="200" r="2"/><circle cx="600" cy="200" r="2"/><circle cx="700" cy="200" r="2"/><circle cx="800" cy="200" r="2"/><circle cx="900" cy="200" r="2"/><circle cx="1000" cy="200" r="2"/><circle cx="1100" cy="200" r="2"/>
    <circle cx="100" cy="300" r="2"/><circle cx="200" cy="300" r="2"/><circle cx="300" cy="300" r="2"/><circle cx="400" cy="300" r="2"/><circle cx="500" cy="300" r="2"/><circle cx="600" cy="300" r="2"/><circle cx="700" cy="300" r="2"/><circle cx="800" cy="300" r="2"/><circle cx="900" cy="300" r="2"/><circle cx="1000" cy="300" r="2"/><circle cx="1100" cy="300" r="2"/>
    <circle cx="100" cy="400" r="2"/><circle cx="200" cy="400" r="2"/><circle cx="300" cy="400" r="2"/><circle cx="400" cy="400" r="2"/><circle cx="500" cy="400" r="2"/><circle cx="600" cy="400" r="2"/><circle cx="700" cy="400" r="2"/><circle cx="800" cy="400" r="2"/><circle cx="900" cy="400" r="2"/><circle cx="1000" cy="400" r="2"/><circle cx="1100" cy="400" r="2"/>
    <circle cx="100" cy="500" r="2"/><circle cx="200" cy="500" r="2"/><circle cx="300" cy="500" r="2"/><circle cx="400" cy="500" r="2"/><circle cx="500" cy="500" r="2"/><circle cx="600" cy="500" r="2"/><circle cx="700" cy="500" r="2"/><circle cx="800" cy="500" r="2"/><circle cx="900" cy="500" r="2"/><circle cx="1000" cy="500" r="2"/><circle cx="1100" cy="500" r="2"/>
    <circle cx="100" cy="600" r="2"/><circle cx="200" cy="600" r="2"/><circle cx="300" cy="600" r="2"/><circle cx="400" cy="600" r="2"/><circle cx="500" cy="600" r="2"/><circle cx="600" cy="600" r="2"/><circle cx="700" cy="600" r="2"/><circle cx="800" cy="600" r="2"/><circle cx="900" cy="600" r="2"/><circle cx="1000" cy="600" r="2"/><circle cx="1100" cy="600" r="2"/>
    <circle cx="100" cy="700" r="2"/><circle cx="200" cy="700" r="2"/><circle cx="300" cy="700" r="2"/><circle cx="400" cy="700" r="2"/><circle cx="500" cy="700" r="2"/><circle cx="600" cy="700" r="2"/><circle cx="700" cy="700" r="2"/><circle cx="800" cy="700" r="2"/><circle cx="900" cy="700" r="2"/><circle cx="1000" cy="700" r="2"/><circle cx="1100" cy="700" r="2"/>
  </g>

  <!-- abstract curve lines -->
  <path d="M0 500 Q300 350 600 450 T1200 350" fill="none" stroke="url(#purpleGrad)" stroke-width="2" stroke-opacity=".15"/>
  <path d="M0 600 Q400 480 800 550 T1200 480" fill="none" stroke="url(#orangeGrad)" stroke-width="1.5" stroke-opacity=".1"/>

  <!-- floating key icon hint (subtle) -->
  <g transform="translate(920,220) rotate(-15)" opacity=".06">
    <rect x="0" y="10" width="60" height="28" rx="14" fill="#7c6dd8"/>
    <circle cx="16" cy="24" r="8" fill="none" stroke="#7c6dd8" stroke-width="3"/>
    <line x1="22" y1="24" x2="50" y2="24" stroke="#7c6dd8" stroke-width="3"/>
    <line x1="42" y1="24" x2="42" y2="16" stroke="#7c6dd8" stroke-width="2.5"/>
    <line x1="48" y1="24" x2="48" y2="18" stroke="#7c6dd8" stroke-width="2.5"/>
  </g>

  <!-- floating shield hint -->
  <g transform="translate(780,550) rotate(10)" opacity=".05">
    <path d="M0-35 C0-35 30-25 30-5 C30 20 0 40 0 40 C0 40-30 20-30-5 C-30-25 0-35 0-35Z" fill="#00b894"/>
  </g>
</svg>
