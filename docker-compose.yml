services:
  postgres:
    image: postgres:16
    container_name: web_sales_total_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: web_sales_total
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d web_sales_total"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
